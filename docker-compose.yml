services:
  postgres:
    image: postgres:16-alpine
    container_name: planta_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: planta_user
      POSTGRES_PASSWORD: planta_dev
      POSTGRES_DB: planta_dev
    volumes:
      - planta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planta_user -d planta_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  seq:
    image: datalust/seq:latest
    container_name: planta_seq
    restart: unless-stopped
    ports:
      - "5341:80"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - planta_seqdata:/data

volumes:
  planta_pgdata:
  planta_seqdata:
