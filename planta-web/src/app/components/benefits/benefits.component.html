<section class="benefits" id="benefits" aria-labelledby="benefits-heading">
  <div class="container">
    <div class="benefits__header" scrollAnimate>
      <span class="section-eyebrow">Resultados</span>
      <h2 id="benefits-heading" class="benefits__title">
        Resultados desde el primer mes
      </h2>
    </div>

    <div class="benefits__grid">
      @for (benefit of benefits; track benefit.title; let i = $index) {
        <div
          class="benefits__card"
          scrollAnimate
          [scrollAnimateDelay]="i * 100"
        >
          <div class="benefits__card-top">
            <span class="benefits__card-emoji" aria-hidden="true">{{ benefit.icon }}</span>
            <span class="benefits__card-stat" aria-label="Mejora: {{ benefit.stat }}">
              {{ benefit.stat }}
            </span>
          </div>
          <h3 class="benefits__card-title">{{ benefit.title }}</h3>
          <p class="benefits__card-text">{{ benefit.description }}</p>
        </div>
      }
    </div>
  </div>
</section>
