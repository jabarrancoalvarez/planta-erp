<section class="cta-final" id="cta" aria-labelledby="cta-heading">
  <div class="cta-final__bg" aria-hidden="true"></div>
  <div class="container cta-final__inner" scrollAnimate>
    <div class="cta-final__content">
      <span class="section-eyebrow">Empieza hoy</span>
      <h2 id="cta-heading" class="cta-final__title">
        ¿Listo para digitalizar tu mantenimiento?
      </h2>
      <p class="cta-final__subtitle">
        14 días gratis, sin tarjeta de crédito, sin permanencias.
        Configúralo en menos de 48 horas.
      </p>

      <div class="cta-final__actions">
        <button class="cta-final__btn-primary" (click)="onRequestDemo()" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M13 10V3L4 14h7v7l9-11h-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Solicitar demo gratuita
        </button>
        <button class="cta-final__btn-secondary" (click)="onViewPricing()" type="button">
          Ver planes y precios
        </button>
      </div>

      <div class="cta-final__guarantees">
        <div class="cta-final__guarantee">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Sin tarjeta de crédito
        </div>
        <div class="cta-final__guarantee">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Cancela cuando quieras
        </div>
        <div class="cta-final__guarantee">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Soporte incluido
        </div>
      </div>
    </div>
  </div>
</section>
