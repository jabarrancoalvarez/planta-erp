<nav class="navbar" [class.scrolled]="isScrolled()">
  <div class="container navbar__inner">
    <!-- Logo -->
    <a class="navbar__logo" href="/" aria-label="FixFlow - Inicio">
      <div class="navbar__logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="navbar__logo-text">FixFlow</span>
    </a>

    <!-- Desktop nav -->
    <ul class="navbar__links" role="list">
      <li>
        <button class="navbar__link" (click)="scrollTo('solution')" type="button">
          Características
        </button>
      </li>
      <li>
        <button class="navbar__link" (click)="scrollTo('how-it-works')" type="button">
          Cómo funciona
        </button>
      </li>
      <li>
        <button class="navbar__link" (click)="scrollTo('pricing')" type="button">
          Precios
        </button>
      </li>
    </ul>

    <!-- Desktop CTA -->
    <div class="navbar__actions">
      <a routerLink="/login" class="btn btn-ghost navbar__link-login">
        Iniciar sesión
      </a>
      <a routerLink="/register" class="btn btn-primary navbar__cta">
        Solicitar demo
      </a>
    </div>

    <!-- Mobile hamburger -->
    <button
      class="navbar__hamburger"
      [class.active]="isMobileMenuOpen()"
      (click)="toggleMobileMenu()"
      type="button"
      [attr.aria-expanded]="isMobileMenuOpen()"
      aria-label="Menú de navegación"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile menu -->
  <div class="navbar__mobile" [class.open]="isMobileMenuOpen()" role="dialog" aria-label="Menú móvil">
    <ul role="list">
      <li>
        <button class="navbar__mobile-link" (click)="scrollTo('solution')" type="button">
          Características
        </button>
      </li>
      <li>
        <button class="navbar__mobile-link" (click)="scrollTo('how-it-works')" type="button">
          Cómo funciona
        </button>
      </li>
      <li>
        <button class="navbar__mobile-link" (click)="scrollTo('pricing')" type="button">
          Precios
        </button>
      </li>
    </ul>
    <div class="navbar__mobile-actions">
      <a routerLink="/login" class="btn btn-secondary" style="width:100%" (click)="closeMobileMenu()">
        Iniciar sesión
      </a>
      <a routerLink="/register" class="btn btn-primary" style="width:100%" (click)="closeMobileMenu()">
        Solicitar demo gratuita
      </a>
    </div>
  </div>
</nav>
